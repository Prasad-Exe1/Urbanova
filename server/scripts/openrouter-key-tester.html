<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenRouter AI — Key Tester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050505;
      --glass: rgba(20, 20, 28, 0.55);
      --border: rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.15);
      --accent: #d4af37;
      --accent-glow: rgba(212,175,55,0.35);
      --green: #22c55e;
      --red: #ef4444;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Fluid background blobs */
    .blob { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .blob-1 { width: 55vw; height: 55vw; top: -15%; left: -15%; background: radial-gradient(circle, rgba(212,175,55,0.12), transparent 70%); animation: drift 30s ease-in-out infinite alternate; }
    .blob-2 { width: 65vw; height: 65vw; bottom: -25%; right: -15%; background: radial-gradient(circle, rgba(40,40,60,0.5), transparent 70%); animation: drift 40s ease-in-out infinite alternate-reverse; }
    @keyframes drift { 0%{transform:translate(0,0)scale(1)} 50%{transform:translate(5%,10%)scale(1.08)} 100%{transform:translate(-5%,-5%)scale(0.95)} }

    .page { position: relative; z-index: 1; width: 100%; max-width: 780px; }

    header { text-align: center; margin-bottom: 2.5rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.3);
      color: var(--accent);
      padding: 0.35rem 0.9rem; border-radius: 100px; font-size: 0.78rem;
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

    h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; letter-spacing: -0.04em; margin-bottom: 0.5rem; }
    h1 span { color: var(--accent); }
    p.sub { color: var(--muted); font-size: 1rem; }

    .card {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-top: 1px solid var(--border-hi);
      border-left: 1px solid var(--border-hi);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      margin-bottom: 1.5rem;
    }

    .key-row {
      display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem;
    }
    label { font-size: 0.85rem; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; margin-bottom: 0.5rem; display: block; }

    input, select, textarea {
      width: 100%; background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 0.85rem 1.1rem;
      color: var(--text); font-family: inherit; font-size: 0.9rem;
      outline: none; transition: all 0.3s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(212,175,55,0.6);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    textarea { resize: vertical; min-height: 110px; font-size: 0.95rem; }
    select { appearance: none; cursor: pointer; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      width: 100%; padding: 1rem; border-radius: 14px;
      font-family: inherit; font-size: 1rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer;
      border: none; transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1);
      background: linear-gradient(135deg, #c9a227, #e6c84d);
      color: #000;
      box-shadow: 0 8px 25px rgba(212,175,55,0.35);
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 14px 35px rgba(212,175,55,0.5); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn svg { animation: spin 1s linear infinite; display: none; }
    .btn.loading svg { display: block; }
    .btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status bar */
    .status-bar {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1.2rem; border-radius: 12px;
      border: 1px solid var(--border); font-size: 0.9rem;
      margin-bottom: 1.5rem; transition: all 0.4s;
      background: rgba(0,0,0,0.2);
    }
    .status-bar .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-bar.ok { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.08); }
    .status-bar.ok .status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-bar.err { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.08); }
    .status-bar.err .status-dot { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .status-bar.loading { border-color: rgba(212,175,55,0.3); background: rgba(212,175,55,0.06); }
    .status-bar.loading .status-dot { background: var(--accent); animation: pulse 1s infinite; }

    /* Response area */
    .response-card { display: none; }
    .response-card.visible { display: block; }

    .response-meta {
      display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem;
    }
    .chip {
      font-size: 0.78rem; padding: 0.3rem 0.75rem; border-radius: 100px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--muted); font-weight: 500;
    }
    .chip span { color: var(--text); }

    .response-text {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem;
      font-size: 0.98rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      color: #ddd;
      max-height: 400px;
      overflow-y: auto;
    }
    .response-text::-webkit-scrollbar { width: 6px; }
    .response-text::-webkit-scrollbar-track { background: transparent; }
    .response-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    .copy-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--muted); padding: 0.4rem 0.9rem; border-radius: 8px;
      font-size: 0.8rem; cursor: pointer; margin-top: 0.75rem;
      font-family: inherit; transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page">
  <header>
    <div class="badge"><div class="dot"></div> Live API Test</div>
    <h1>OpenRouter <span>AI Tester</span></h1>
    <p class="sub">Send a prompt to any model and verify your API key instantly.</p>
  </header>

  <!-- Config card -->
  <div class="card">
    <div style="margin-bottom:1.5rem">
      <label>🔑 OpenRouter API Key</label>
      <input type="password" id="apiKey" value="" placeholder="sk-or-v1-... (paste your key)" />
    </div>

    <div class="row-2">
      <div>
        <label>🤖 Model</label>
        <select id="model">
          <option value="openai/gpt-4o-mini">GPT-4o Mini (fast &amp; cheap)</option>
          <option value="openai/gpt-4o">GPT-4o</option>
          <option value="anthropic/claude-3.5-haiku">Claude 3.5 Haiku</option>
          <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
          <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
          <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (FREE)</option>
          <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (FREE)</option>
          <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
        </select>
      </div>
      <div>
        <label>🌡️ Temperature</label>
        <input type="range" id="temp" min="0" max="2" step="0.1" value="0.7"
          oninput="document.getElementById('tempVal').textContent=this.value"
          style="padding:0.55rem 0;cursor:pointer" />
        <div style="font-size:0.8rem;color:var(--muted);margin-top:0.3rem">Value: <span id="tempVal">0.7</span></div>
      </div>
    </div>

    <div style="margin-bottom:1.5rem">
      <label>💬 Prompt</label>
      <textarea id="prompt">Hello! Please confirm you are working by telling me one interesting fact about real estate in India. Keep it to 2-3 sentences.</textarea>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="status-dot"></div>
      <span id="statusText">Ready to test. Click the button below.</span>
    </div>

    <button class="btn" id="testBtn" onclick="runTest()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
      </svg>
      <span class="btn-text">⚡ Test API Key Now</span>
    </button>
  </div>

  <!-- Response card -->
  <div class="card response-card" id="responseCard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h3 style="font-size:1.1rem;font-weight:700">🟢 Response</h3>
      <button class="copy-btn" onclick="copyResponse()">📋 Copy</button>
    </div>

    <div class="response-meta" id="responseMeta"></div>
    <div class="response-text" id="responseText"></div>
  </div>

  <footer>Urbanova Platform — OpenRouter API Diagnostic Tool</footer>
</div>

<script>
  async function runTest() {
    const btn = document.getElementById('testBtn');
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');
    const responseCard = document.getElementById('responseCard');
    const responseText = document.getElementById('responseText');
    const responseMeta = document.getElementById('responseMeta');

    const apiKey = document.getElementById('apiKey').value.trim();
    const model  = document.getElementById('model').value;
    const prompt = document.getElementById('prompt').value.trim();
    const temp   = parseFloat(document.getElementById('temp').value);

    if (!apiKey || !prompt) {
      setStatus('err', '⚠️ Please fill in the API key and prompt.');
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.disabled = true;
    setStatus('loading', 'Connecting to OpenRouter...');
    responseCard.classList.remove('visible');

    const startTime = Date.now();

    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
          'X-Title': 'Urbanova AI Tester'
        },
        body: JSON.stringify({
          model,
          temperature: temp,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
      const data = await res.json();

      if (!res.ok) {
        const errMsg = data?.error?.message || `HTTP ${res.status}`;
        setStatus('err', `❌ API Error: ${errMsg}`);
        responseText.textContent = JSON.stringify(data, null, 2);
        responseMeta.innerHTML = `<div class="chip">Status: <span>${res.status}</span></div>`;
        responseCard.classList.add('visible');
        return;
      }

      const message = data.choices?.[0]?.message?.content || '(No content)';
      const usage   = data.usage || {};
      const modelUsed = data.model || model;

      setStatus('ok', `✅ Success! API key is valid and working. Response in ${elapsed}s`);

      responseMeta.innerHTML = `
        <div class="chip">Model: <span>${modelUsed}</span></div>
        <div class="chip">Prompt tokens: <span>${usage.prompt_tokens ?? '—'}</span></div>
        <div class="chip">Completion tokens: <span>${usage.completion_tokens ?? '—'}</span></div>
        <div class="chip">Total tokens: <span>${usage.total_tokens ?? '—'}</span></div>
        <div class="chip">Time: <span>${elapsed}s</span></div>
      `;

      responseText.textContent = message;
      responseCard.classList.add('visible');

    } catch (err) {
      setStatus('err', `❌ Network error: ${err.message}`);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function setStatus(type, text) {
    const bar = document.getElementById('statusBar');
    const txt = document.getElementById('statusText');
    bar.className = 'status-bar ' + type;
    txt.textContent = text;
  }

  function copyResponse() {
    const text = document.getElementById('responseText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy', 2000);
    });
  }

  // Allow Enter key in prompt to not submit
  document.getElementById('prompt').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) runTest();
  });
</script>
</body>
</html>
